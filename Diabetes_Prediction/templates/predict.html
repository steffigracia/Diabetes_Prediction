<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main-container">

    <div class="card large-card">

        <h1>Diabetes Prediction Form</h1>
        <p class="subtitle">
            Enter patient details
        </p>

        <form action="/predict" method="POST">

            <label>Pregnancies</label>
            <input type="number"
                   name="Pregnancies"
                   required>

            <label>Glucose</label>
            <input type="number"
                   name="Glucose"
                   required>

            <label>Blood Pressure</label>
            <input type="number"
                   name="BloodPressure"
                   required>

            <label>Skin Thickness</label>
            <input type="number"
                   name="SkinThickness"
                   required>

            <label>Insulin</label>
            <input type="number"
                   name="Insulin"
                   required>

            <label>BMI</label>
            <input type="number"
                   step="any"
                   name="BMI"
                   required>

            <label>Diabetes Pedigree Function</label>
            <input type="number"
                   step="any"
                   name="DiabetesPedigreeFunction"
                   required>

            <label>Age</label>
            <input type="number"
                   name="Age"
                   required>

            <button type="submit">
                Predict Diabetes
            </button>

        </form>

    </div>

</div>

</body>
</html>
